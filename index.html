<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Color Connect Puzzle</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="topBar">

<div class="left">
❤️ <span id="life">5</span>
</div>

<div class="center">
LEVEL <span id="level">1</span>
</div>

<div class="right">
🪙 <span id="coin">0</span>
</div>

</div>

<div class="game">

<canvas id="gameCanvas"></canvas>

</div>

<div class="bottomBar">

<button id="undoBtn">
↩ Undo
</button>

<button id="resetBtn">
🔄 Reset
</button>

<button id="hintBtn">
💡 Hint
</button>

</div>

<div id="completeBox" class="hide">

<h1>LEVEL COMPLETE</h1>

<p>⭐⭐⭐</p>

<button id="nextBtn">
Next Level →
</button>

</div>

<script src="script.js"></script>

</body>
</html>
