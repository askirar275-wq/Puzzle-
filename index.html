<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Color Connect</title>

<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- HOME -->
<div id="home" class="screen">

<h1 class="title">COLOR CONNECT</h1>

<button id="playBtn">▶ PLAY</button>

<button id="shopBtn">🛒 SHOP</button>

<button id="settingBtn">⚙ SETTINGS</button>

</div>

<!-- GAME -->
<div id="gameArea" class="screen" style="display:none;">

<div id="topBar">

<div>🪙 <span id="coins">0</span></div>

<div>💎 <span id="gems">0</span></div>

<div>⭐ <span id="score">0</span></div>

<div>📍 <span id="level">1</span></div>

<div>⏰ <span id="timer">60</span></div>

<div>❤️ <span id="lives">3</span></div>

</div>

<canvas id="game"></canvas>

<div id="controls">

<button id="undo">Undo</button>

<button id="reset">Reset</button>

<button id="hint">Hint</button>

<button id="pause">Pause</button>

</div>

</div>

<!-- LEVEL COMPLETE -->

<div id="complete" class="popup">

<div class="box">

<h2>🎉 LEVEL COMPLETE</h2>

<p id="starText">⭐⭐⭐</p>

<button id="nextLevel">NEXT LEVEL</button>

</div>

</div>

<!-- GAME OVER -->

<div id="gameOver" class="popup">

<div class="box">

<h2>💀 GAME OVER</h2>

<button id="restartGame">Restart</button>

</div>

</div>

<script src="script.js"></script>

</body>
  </html>
